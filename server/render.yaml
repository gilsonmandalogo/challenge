services:
  - type: web
    name: degen-coin-flip-api
    runtime: node
    rootDir: server
    buildCommand: cd .. && npm install && npm run build -w server
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        sync: false
      - key: HOUSE_EDGE
        value: "0.035"
